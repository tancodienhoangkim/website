services:
  postgres:
    image: postgres:16-alpine
    container_name: hoangkim-tcd-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hoangkim_tcd
      POSTGRES_PASSWORD: hoangkim_tcd
      POSTGRES_DB: hoangkim_tcd_cms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hoangkim_tcd -d hoangkim_tcd_cms"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
